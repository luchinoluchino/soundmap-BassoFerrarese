<!DOCTYPE html>
<html>
<head>
    <title>Mappa Sonora - Delta del Po</title>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <style>
        /* RESET E IMPOSTAZIONI MINIMALI */
        body {
            margin: 0;
            padding: 0;
            background: #111;
        }
        #map {
            height: 100vh;
            width: 100%;
            background: #0f0f0f;
        }

        /* STILE MAPPA: NASCONDO ELEMENTI SUPERFLUI */
        .leaflet-control-attribution {
            font-size: 8px;
            background: rgba(0,0,0,0.4);
            color: #555;
            backdrop-filter: blur(4px);
            padding: 2px 5px;
        }
        .leaflet-control-attribution a {
            color: #777;
        }
        /* Disabilito zoom control se non serve, lo lascio opzionale ma lo stilo minimale */
        .leaflet-control-zoom {
            border: none !important;
            background: rgba(20,20,20,0.6) !important;
            backdrop-filter: blur(8px);
            border-radius: 0 !important;
        }
        .leaflet-control-zoom a {
            background: transparent !important;
            color: #ddd !important;
            border: none !important;
            border-bottom: 1px solid #333 !important;
        }

        /* MARKER MINIMAL: CERCHIO VUOTO (COME UN ANELLO) */
        .custom-marker {
            background: transparent;
            width: 12px !important;
            height: 12px !important;
            border: 1.5px solid rgba(255,255,255,0.85);
            border-radius: 50%;
            transition: all 0.25s ease-out;
            box-shadow: none;
            cursor: pointer;
        }
        /* Quando attivo: si riempie e diventa bianco */
        .marker-active {
            background: rgba(255,255,255,1);
            border-color: rgba(255,255,255,1);
            transform: scale(1.2);
            box-shadow: 0 0 6px rgba(255,255,255,0.5);
        }

        /* POPUP TOTALMENTE TRASPARENTE E MINIMO */
        .leaflet-popup {
            border: none !important;
            background: transparent !important;
            box-shadow: none !important;
            margin-bottom: 6px !important;
        }
        .leaflet-popup-content-wrapper {
            background: transparent !important;
            box-shadow: none !important;
            padding: 0 !important;
            margin: 0 !important;
        }
        .leaflet-popup-tip {
            display: none !important;
        }
        .leaflet-popup-content {
            margin: 0 !important;
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
            font-weight: 300;
            font-size: 11px;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            color: white;
            background: transparent;
            text-align: center;
            white-space: nowrap;
            padding: 2px 0 0 0;
        }
        /* Rimuovo il pulsante di chiusura */
        .leaflet-popup-close-button {
            display: none !important;
        }

        /* STILE PER I TESTI DENTRO IL POPUP */
        .popup-title {
            font-size: 11px;
            font-weight: 400;
            background: rgba(0,0,0,0.45);
            backdrop-filter: blur(3px);
            padding: 2px 6px;
            border-radius: 14px;
            letter-spacing: 1px;
            color: #f0f0f0;
            display: inline-block;
        }
        .time-display {
            display: none; /* Nascondo il timer per massima pulizia, come nel sito di riferimento */
        }

        audio {
            display: none;
        }
    </style>
</head>
<body>
<div id="map"></div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

<script>
    // IMPOSTAZIONI MAPPA: look desaturato e molto "cartografico pulito"
    var map = L.map('map', {
        zoomControl: true,   // Lo teniamo ma stilizzato
        fadeAnimation: true,
        attributionControl: true
    }).setView([44.807818, 12.045471], 10.5);

    // Layer toni neutri/grigi: CartoDB Voyager (solo etichette e strade) ma con effetto pulito
    // Per un'estetica Phantom Islands, uso un basemap molto anonimo e leggero: CartoDB Positron (solo labels)
    L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
        attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> &copy; CARTO',
        subdomains: 'abcd',
        maxZoom: 14,
        minZoom: 8
    }).addTo(map);

    // ICONA MINIMAL (cerchio vuoto)
    var minimalIcon = L.divIcon({ 
        className: 'custom-marker', 
        iconSize: [12, 12], 
        iconAnchor: [6, 6]   // centro preciso
    });

    // Funzione formatTime (non utilizzata nell'UI ma mantenuta per eventuali debug)
    function formatTime(seconds) {
        if (isNaN(seconds)) return "0:00";
        var min = Math.floor(seconds / 60);
        var sec = Math.floor(seconds % 60);
        return min + ":" + (sec < 10 ? "0" : "") + sec;
    }

    // Aggiunta punti audio con stile super essenziale
    function addAudioPoint(lat, lng, titolo, fileAudio) {
        var marker = L.marker([lat, lng], { icon: minimalIcon }).addTo(map);
        var audioId = "audio-" + Math.floor(Math.random() * 10000);
        var audio = new Audio(fileAudio);
        audio.id = audioId;
        // Non appendiamo al body? Meglio sì per assicurarci che funzioni
        document.body.appendChild(audio);

        // Contenuto popup: solo titolo minimale (nessun timer visibile)
        var content = `<div class="popup-title">${titolo}</div>`;
        marker.bindPopup(content, { 
            offset: [0, -10],   // Posizionato poco sopra il marker
            closeOnClick: false,
            autoPan: false
        });

        // Gestione click: play/pause con stile minimal
        marker.on('click', function(e) {
            L.DomEvent.stopPropagation(e); // Evita di propagare al click sulla mappa subito

            if (!audio.paused) {
                audio.pause();
                marker._icon.classList.remove('marker-active');
                marker.closePopup();
            } else {
                // Ferma tutti gli altri audio e rimuovi stati attivi
                document.querySelectorAll('audio').forEach(function(a) {
                    if (a !== audio) {
                        a.pause();
                        a.currentTime = 0;
                    }
                });
                document.querySelectorAll('.custom-marker').forEach(m => m.classList.remove('marker-active'));
                
                audio.currentTime = 0;
                audio.play();
                marker._icon.classList.add('marker-active');
                marker.openPopup();
            }
        });

        // Al termine della riproduzione, chiudi popup e rimuovi stato attivo
        audio.onended = function() {
            marker._icon.classList.remove('marker-active');
            marker.closePopup();
        };
        
        // Opzionale: se l'audio ha errori (file non trovato) evitiamo errori in console
        audio.onerror = function() {
            console.warn(`Audio non trovato: ${fileAudio}`);
        };
    }

    // ------------------------ LISTA DEI TUOI PUNTI (identica, con titoli brevi e chiari) ------------------------
    addAudioPoint(44.730925, 12.241766, "Bamboo a Lido Nazioni", "Nazioni_bamboo_02.mp3");
    addAudioPoint(44.896928, 11.646987, "Argine di Francolino", "Francolino_04.mp3");
    addAudioPoint(44.983694, 11.974799, "Argine di Berra", "Berra_03.mp3");
    addAudioPoint(44.971778, 12.053048, "Argine di Serravalle", "Serravalle_01.mp3");
    addAudioPoint(44.846807, 11.942832, "Canale di Gherardi", "Gherardi_03.mp3");
    addAudioPoint(44.804372, 12.266573, "Sotto un ponte a Volano", "Volano_01.mp3");
    addAudioPoint(44.938149, 12.519243, "Spiaggia di Pila", "SpiaggiaDiPila_mare_24bit48.mp3");
    addAudioPoint(44.863988, 12.259193, "Boscone della Mesola", "BosconedellaMesola_Cicale+Mosche_24bit48.mp3");
    addAudioPoint(44.832173, 11.831655, "Volano e vento a Denore", "Montaggio_011+012_Denore.mp3");
    addAudioPoint(44.832122, 11.831685, "In paese a Denore", "Montaggio_paese+macchina-agricola_Denore.mp3");
    addAudioPoint(44.831695, 12.106035, "Domenica a Codigoro", "Codigoro(piazza)_01.mp3");
    addAudioPoint(44.797617, 11.889744, "In paese a Rero", "Montaggio_Rero.mp3");
    addAudioPoint(44.883925, 11.980956, "Scuola a Jolanda di Savoia", "Jolanda(Scuola)_01.mp3");  
    addAudioPoint(44.817574, 11.894806, "Piazza Repubblica a Tresigallo", "Montaggio_PiazzaRepubblica.mp3");
    addAudioPoint(44.922990, 12.231793, "Davanti al Castello di Mesola", "Mesola(Campane)_01.mp3");
    addAudioPoint(44.817847, 11.897149, "Piazza Italia a Tresigallo", "Montaggio_PiazzaItalia.mp3");
    addAudioPoint(44.903070, 12.262778, "Oasi di Torre Abate a Mesola", "Mesola(Oasi)_002.mp3");
    addAudioPoint(44.822732, 12.039893, "Sostegno e Torre di Tieni", " Montaggio_Tieni.mp3");

    // CLICK SULLA MAPPA PER FERMARE TUTTO (come nello stile Phantom Islands: silenzio se clicchi fuori)
    map.on('click', function() {
        document.querySelectorAll('audio').forEach(function(a) {
            a.pause();
            a.currentTime = 0;
        });
        document.querySelectorAll('.custom-marker').forEach(m => m.classList.remove('marker-active'));
        map.closePopup();
    });

    // Piccolo accorgimento: evita che il click sul popup chiuda tutto (utile)
    map.on('popupopen', function() {
        // non facciamo nulla, solo garantiamo che il popup sia stabile
    });
</script>

</body>
</html>
